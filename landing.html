<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar-Practice</title>
    <style>

        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: bolder;
        }
        nav{
            height: 75px;
            background-color: #212529;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 7px solid #212529;
        }

        .menublock1,.label1{
            height: 60px;
            width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        

        }

        .menublock1 a{
            text-decoration: none;
            color: white;
        }

        input{
           height: 40px;
           width: 200px;
           border-radius: 4px;
           border: 1px solid white;
        }

        button{
            height: 40px;
            width: 70px;
            background-color: #212529;
            color: white;
            border: 1px solid white;
            border-radius: 4px;
            
        }


    </style>
</head>
<body>
    <!-- <div> -->
        <nav>
            <div class="menublock1">
                <a href="" style="font-size: large;">Brand</a>
                <a href="">Home</a>
                <a href="" style="color: #959793;">About</a>
                <a href="" style="color: #959793;">Products</a>
            </div>
            <div class="label1" style="width: 300px;">
                <input type="text" placeholder="Search">
                <button>Search</button>

            </div>
        </nav>
        <br><br>

        <nav style="background-color: #0D6EFD ; border:7px solid #0D6EFD">
            <div class="menublock1">
                <a href="" style="font-size: large;">Brand</a>
                <a href="">Home</a>
                <a href="" style="color: #dfe3dd;">About</a>
                <a href="" style="color: #dfe3dd;">Products</a>
            </div>
            <div class="label1" style="width: 300px;">
                <input type="text" placeholder="Search">
                <button style="background-color:#0D6EFD">Search</button>

            </div>
        </nav>
        <br><br>

            <nav style="background-color: #E3F2FD ; border:7px solid #E3F2FD">
            <div class="menublock1">
                <a href="" style="font-size: large; color:black">Brand</a>
                <a href="" style="color: black;">Home</a>
                <a href="" style="color: #959793;">About</a>
                <a href="" style="color: #959793;">Products</a>
            </div>
            <div class="label1" style="width: 300px;">
                <input type="text" placeholder="Search">
                <button style="background-color:#E3F2FD; color:blue; border:1px solid blue">Search</button>

            </div>
        </nav>

        
</body>
</html>
