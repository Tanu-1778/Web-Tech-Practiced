<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart</title>

    <style>

        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: bolder;
        }

        nav{
            height: 75px;

            background-color: whitesmoke;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2A73EF;
        }

        #logoblock,#menublock,#searchblock{
            height: 75px;
            width: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;

        }

        #logoblock img{
            height: 60px;
            width: 200px;

        }

        input{
            width: 500px;
            height: 50px;
            border: 1px solid blue;
            border-radius: 3px;
        }

        #menublock a{
            text-decoration: none;
            color: white;
        }
        button{
            height: 40px;
            width: 100px;
            color: blue;
            background-color: white;
            border: white;
        }

        #photoblock{
            height: 80vh;
            
             display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        #offerblock{
            width: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        #offerblock img{
           height: 280px;
            width: 380px;
            border-radius: 30px;
        }


        #photo1,#photo2,#photo3{
            height: 300px;
            width: 300px;
            border-radius: 30%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            
            background-color: white;

        }

        #offer1,#offer2{
            height: 400px;
            width: 800px;
            border-radius: 30%;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            
            
            background-color: white;

        }

        #photoblock img{
            height: 280px;
            width: 280px;
            border-radius: 30px;
        }
    </style>
</head>


<body>
    <nav>

        <div id="searchblock" style="width: 500px;">
            <input type="text" placeholder="Search for Products ,Brands and more">
        </div>
        <div id="menublock">
            <button>Login</button>

    </nav>
