<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NavbarLanding-Page</title>
</head>
<style>
    *{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: bolder;
    }
    nav{
        height: 75px;
        display: flex;
        justify-content:center;
        align-items: center;
        background-color: black;
    }

    #logoblock{
        height: 75px;
        width: 400px;
    
        display: flex;
        justify-content: space-evenly;
        align-items: center;

    }

    #logoblock img{
        height: 50px;
    }


    #photoblock{
        height: 80vh;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
    }

    #photo1,#photo2,#photo3{
        height: 350px;
        width: 350px;
        border-radius: 30px;
        border: 2px solid black;
        background-color: white;
        box-shadow: 0px 0px 12px white;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;


    }

    #photoblock img{
        height: 200px;
        
    }

    input,button{
        height: 30px;
        border: 1px solid black;
        border-radius: 5px;
        

    }

    button{
        background-color: black;
        color: white;
        width: 180px;
    }

    footer{
        background-color: black;
        color: white;
        font-size: smaller;
        height: 50px;
    }

</style>
<body>
    <nav>
        <div id="logoblock">
            <img src="https://www.edigitalagency.com.au/wp-content/uploads/new-Uber-logo-white-png-large-size.png">
        </div>
    </nav>
   

    <div id="photoblock">
        <div id="photo1">
            <img src="https://cn-geo1.uber.com/image-proc/crop/resizecrop/udam/format=auto/width=1344/height=896/srcb64=aHR0cHM6Ly90Yi1zdGF0aWMudWJlci5jb20vcHJvZC91ZGFtLWFzc2V0cy85NTM4NTEyZC1mZGUxLTRmNzMtYmQ1MS05Y2VmZjRlMjU0ZjEucG5n" height="155px "><br><br>
            <div class="input">
                    <input type="number" placeholder="Enetr KM"><br><br>
                    <button><center>Book Now</center></button>
            </div>

        </div>
        <div id="photo2">
            <img src="https://clipart-library.com/2023/Uber_Auto_312x208_pixels_Mobile.png" height="180px"><br><br>
            <div class="input">
                    <input type="number" placeholder="Enetr KM"><br><br>
                    <button><center>Book Now</center></button>
            </div>

        </div>
        <div id="photo3">
            <img src="https://i.pinimg.com/originals/93/c1/05/93c105244c0a3de81267a89cb13386f7.png"><br><br>
            <div class="input">
                    <input type="number" placeholder="Enetr KM"><br><br>
                    <button><center>Book Now</center></button>
            </div>
            

        </div>

    </div>

    <footer><center>Copyright © 2014 Uber J33. All Rights Reserved. Designed by <a href="">JoomlArt.com</a> </center></footer>
    
</body>
</html>
