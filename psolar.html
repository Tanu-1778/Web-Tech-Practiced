<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="StyleSheet" href="./psolar.css">

</head>
<body>
    <div id="galaxy">
        <div id="orbit">
            <div id="mercury"></div>
        </div>
        <div id="orbit2">
            <div id="venus"></div>
        </div>
        <div id="orbit3">
            <div id="earth"></div>
        </div>
        <div id="orbit4">
            <div id="mars"></div>
        </div>
        <div id="orbit5">
            <div id="jupiter"></div>
        </div>
        <div id="orbit6">
            <div id="saturn"></div>
        </div>
        <div id="orbit7">
            <div id="uranus"></div>
        </div>
        <div id="orbit8">
            <div id="naptune"></div>
        </div>
        <div id="orbit9">
            <div id="pluto"></div>
        </div>
        
        <div id="sun"></div>
    </div>
    
</body>
</html>
