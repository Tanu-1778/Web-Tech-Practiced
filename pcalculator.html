<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./pcalculator.css">

</head>
<body>
    <div id="cal-body">
        <div id="cal-input">
            <input type="number">
        </div>
        <div id="row1" class="row1">
            <div class="box1">+</div>
            <div class="box1">-</div>
            <div class="box1">X</div>
            <div class="box1">%</div>
        </div>
        <div id="row2" class="row2">
            <div class="box2">7</div>
            <div class="box2">8</div>
            <div class="box2">9</div>
            <div class="box2">4</div>
        </div>
        <section id="row3" class="row3">
            <div class="box3">5</div>
            <div class="box3">6</div>
            <div class="box3">1</div>
            <div class="box3">2</div>
        </section>
        <section id="row4" class="row4">
            <div class="box4">3</div>
            <div class="box4">0</div>
            <div class="box4">.</div>
            <div class="box4" style="background-color: #F55C47; color:white; font-size:xx-large">c</div>
        </section>
        <section id="row5">
            <div id="equals">=</div>
        </section>
    </div>
    
</body>
</html>
