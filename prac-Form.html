    <h2>Login Form</h2>

  <form autocomplete="on">
    <fieldset>
        <label for="fname" class="label"><b>First Name:</b></label>
        <input type="text" id="fnme" placeholder="Enter your first Name">

        <input type="text" id="lname" placeholder="Enter your Last Name">

        <label for="username" class="label"><b>UserName:</b></label>
        <input type="text" id="username" placeholder="Enter Username">
        <br><br>

        <label for="password" class="label"><b>Password:</b></label>
        <input type="password" id="password" required placeholder="Enter your password" minlength="8">
        <br><br>

        <label for="email" class="label"><b>Email:</b></label>
        <input type="email" id="email" required placeholder="Enter your email id">
        <br><br>

        <label for="dob" class="label"><b>DOB:</b></label>
        <input type="date" id="dob" >
        <br><br>

        <label for="gender" class="label"><b>Gender:</b></label>
        <br>
        <b class="gender">Male</b><input type="radio" name="gender" >
        <br>
        <b class="gender">Female</b><input type="radio" name="gender" >
        <br>
        <b class="gender">Other</b><input type="radio" name="gender" >
        <br>

         <h3>Skills:</h3>
        <select name="skills" id="skills" class="label">Skills:
            <option class="opt" value="html">HTML</option>
            <option class="opt" value="css">CSS</option>
            <option class="opt" value="JavaScript">JavaScript</option>
            <option class="opt" value="java" reserved>Java</option>
        </select>
        <br><br>
        
        <button>Create</button>
        <button>Cancel</button>

    </fieldset>
  </form>
